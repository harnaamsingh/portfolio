<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harnaam Singh — Illustrator</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #08090b; }
    #c { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }
    .home-nav {
      position: fixed; inset: 0 0 auto; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 26px 36px; pointer-events: none;
    }
    .home-logo {
      font-family: var(--font-display); font-size: 17px; font-weight: 600;
      letter-spacing: 0.04em; color: rgba(255,255,255,0.88);
      pointer-events: auto; text-decoration: none;
    }
    .menu-pill {
      pointer-events: auto; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .home-hero {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 40px 52px; pointer-events: none;
    }
    .hero-eyebrow {
      font-family: var(--font-body); font-size: 11px; font-weight: 700;
      letter-spacing: 0.20em; text-transform: uppercase;
      color: rgba(255,255,255,0.30); margin-bottom: 14px;
      opacity: 0; animation: fadeUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-name {
      font-family: var(--font-display); font-size: clamp(64px, 10.5vw, 148px);
      font-weight: 500; line-height: 0.92; color: #fff; margin: 0 0 26px;
      opacity: 0; transform: translateY(18px);
      animation: fadeUp 1.1s 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-name em { font-style: italic; color: rgba(255,255,255,0.36); display: block; }
    .hero-tagline {
      font-family: var(--font-body); font-size: clamp(13px, 1.2vw, 16px);
      font-weight: 300; color: rgba(255,255,255,0.40); line-height: 1.65;
      opacity: 0; animation: fadeUp 0.9s 1.0s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .home-cta {
      position: fixed; bottom: 44px; right: 40px; z-index: 10;
      opacity: 0; animation: fadeUp 0.9s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .btn-pill {
      background: rgba(255,255,255,0.94); color: #111; border: none;
      border-radius: 999px; padding: 14px 30px; font-family: var(--font-body);
      font-weight: 700; font-size: 14px; letter-spacing: 0.01em;
      text-decoration: none; display: inline-block;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      transition: transform 0.2s, box-shadow 0.2s; white-space: nowrap;
    }
    .btn-pill:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,0.55); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) {
      .home-nav  { padding: 20px 22px; }
      .home-hero { padding: 0 22px 100px; }
      .home-cta  { bottom: 30px; right: 22px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header class="home-nav" role="banner">
    <a href="index.html" class="home-logo">HS</a>
    <button class="menu-pill" aria-label="Open navigation">Menu</button>
  </header>
  <div class="home-hero">
    <p class="hero-eyebrow">Portfolio · 2026</p>
    <h1 class="hero-name">Harnaam<em>Singh</em></h1>
    <p class="hero-tagline">Illustrator — concept art,<br>comics &amp; storyboards.</p>
  </div>
  <div class="home-cta">
    <a href="artworks.html" class="btn-pill">Explore Work →</a>
  </div>

<script>
(function () {
  'use strict';

  const cv  = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const DPR = Math.min(devicePixelRatio || 1, 2);

  let W, H;
  function resize() {
    W = cv.width  = innerWidth  * DPR;
    H = cv.height = innerHeight * DPR;
    cv.style.width  = innerWidth  + 'px';
    cv.style.height = innerHeight + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    buildSketches();
  }

  const mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };
  window.addEventListener('mousemove', e => {
    mouse.tx = e.clientX / innerWidth;
    mouse.ty = e.clientY / innerHeight;
  }, { passive: true });

  // ── Charcoal stroke helper ────────────────────────────────
  const S = 200;
  let sketches = [];

  function rl(c, x0, y0, x1, y1, am) {
    // Charcoal: dark, thick, rough double stroke
    c.save();
    c.globalAlpha = 0.95 * (am || 1);
    c.strokeStyle = '#100c08';
    c.lineWidth   = 2.2 + Math.random() * 1.5;
    c.lineCap     = 'round';
    const mx = (x0+x1)/2 + (Math.random()-0.5)*8;
    const my = (y0+y1)/2 + (Math.random()-0.5)*8;
    c.beginPath(); c.moveTo(x0,y0); c.quadraticCurveTo(mx,my,x1,y1); c.stroke();
    // second rough pass — charcoal texture
    c.globalAlpha = 0.95 * (am||1) * 0.35;
    c.lineWidth   = 0.9;
    c.beginPath(); c.moveTo(x0+2,y0+1); c.quadraticCurveTo(mx+1,my+2,x1+2,y1+1); c.stroke();
    c.restore();
  }

  function buildSketches() {
    sketches = [];

    function mk(fn) {
      const oc = document.createElement('canvas');
      oc.width = oc.height = S;
      fn(oc.getContext('2d'), S);
      sketches.push(oc);
    }

    // 1 — Face
    mk((c, S) => {
      const cx=S/2, cy=S*0.40;
      c.save(); c.globalAlpha=0.92; c.strokeStyle='#100c08'; c.lineWidth=2.8;
      c.beginPath(); c.ellipse(cx,cy,S*0.22,S*0.27,0,0,Math.PI*2); c.stroke(); c.restore();
      rl(c,cx-22,cy-10,cx-8,cy-10,1);
      rl(c,cx+8,cy-10,cx+22,cy-10,1);
      rl(c,cx-24,cy-18,cx-6,cy-16,0.85);
      rl(c,cx+6,cy-16,cx+24,cy-18,0.85);
      rl(c,cx,cy-3,cx-5,cy+10,0.8);
      rl(c,cx-5,cy+10,cx+6,cy+10,0.8);
      c.save(); c.globalAlpha=0.88; c.strokeStyle='#100c08'; c.lineWidth=2.6;
      c.beginPath(); c.arc(cx,cy+18,12,0.15,Math.PI-0.15); c.stroke(); c.restore();
      for(let i=0;i<7;i++) rl(c,cx-20+i*7,cy-S*0.27,cx-22+i*8,cy-S*0.36,0.65);
      rl(c,cx-6,cy+S*0.27,cx-6,cy+S*0.38,0.8);
      rl(c,cx+6,cy+S*0.27,cx+6,cy+S*0.38,0.8);
      rl(c,cx-6,cy+S*0.38,cx-30,cy+S*0.45,0.8);
      rl(c,cx+6,cy+S*0.38,cx+30,cy+S*0.45,0.8);
    });

    // 2 — Hand with pen
    mk((c, S) => {
      const bx=S*0.38, by=S*0.68;
      rl(c,bx-28,by+28,bx+44,by-52,1);
      rl(c,bx-24,by+32,bx+48,by-48,0.55);
      rl(c,bx+44,by-52,bx+54,by-62,1);
      rl(c,bx,by,bx-14,by-20,0.9);
      rl(c,bx+6,by-4,bx-4,by-26,0.9);
      rl(c,bx+12,by-8,bx+2,by-28,0.85);
      rl(c,bx+18,by-14,bx+12,by-30,0.8);
      rl(c,bx-8,by+8,bx-24,by-8,0.85);
      c.save(); c.globalAlpha=0.82; c.strokeStyle='#100c08'; c.lineWidth=2.5;
      c.beginPath(); c.arc(bx-4,by+18,14,Math.PI*0.9,Math.PI*1.6); c.stroke(); c.restore();
      rl(c,bx+54,by-62,bx+76,by-57,0.9);
      rl(c,bx+54,by-62,bx+72,by-74,0.75);
      rl(c,bx+54,by-62,bx+80,by-68,0.5);
    });

    // 3 — Running figure
    mk((c, S) => {
      const cx=S/2, ty=S*0.10;
      c.save(); c.globalAlpha=0.90; c.strokeStyle='#100c08'; c.lineWidth=2.8;
      c.beginPath(); c.arc(cx,ty+10,12,0,Math.PI*2); c.stroke(); c.restore();
      rl(c,cx,ty+22,cx-5,ty+56,1);
      rl(c,cx-4,ty+30,cx-38,ty+18,0.95);
      rl(c,cx-38,ty+18,cx-52,ty+32,0.9);
      rl(c,cx-4,ty+30,cx+32,ty+16,0.95);
      rl(c,cx+32,ty+16,cx+48,ty+6,0.9);
      rl(c,cx-4,ty+56,cx-24,ty+88,0.95);
      rl(c,cx-24,ty+88,cx-32,ty+110,0.9);
      rl(c,cx-4,ty+56,cx+20,ty+80,0.95);
      rl(c,cx+20,ty+80,cx+30,ty+110,0.9);
      for(let i=0;i<6;i++) rl(c,cx+38+i*4,ty+26+i*5,cx+52+i*3,ty+24+i*4,0.5);
    });

    // 4 — Eye close-up
    mk((c, S) => {
      const cx=S/2, cy=S/2;
      c.save(); c.globalAlpha=0.95; c.strokeStyle='#100c08'; c.lineWidth=3.0;
      c.beginPath(); c.moveTo(cx-48,cy); c.quadraticCurveTo(cx,cy-32,cx+48,cy);
      c.quadraticCurveTo(cx,cy+26,cx-48,cy); c.stroke(); c.restore();
      c.save(); c.globalAlpha=0.88; c.strokeStyle='#100c08'; c.lineWidth=2.4;
      c.beginPath(); c.arc(cx,cy,18,0,Math.PI*2); c.stroke(); c.restore();
      c.save(); c.globalAlpha=0.95; c.fillStyle='#100c08';
      c.beginPath(); c.arc(cx,cy,8,0,Math.PI*2); c.fill(); c.restore();
      for(let a=0;a<12;a++) {
        const ang=a*Math.PI/6;
        rl(c,cx+Math.cos(ang)*10,cy+Math.sin(ang)*10,cx+Math.cos(ang)*17,cy+Math.sin(ang)*17,0.8);
      }
      for(let i=0;i<9;i++) {
        const lx=cx-36+i*9;
        const ly=cy-Math.sqrt(Math.max(0,33*33-(lx-cx)*(lx-cx)));
        rl(c,lx,ly,lx+(Math.random()-0.5)*3,ly-11-Math.random()*6,0.9);
      }
    });

    // 5 — Ruled page with handwriting marks
    mk((c, S) => {
      for(let y=22;y<S-12;y+=14) rl(c,14,y,S-14,y,0.35);
      rl(c,30,12,30,S-12,0.45);
      rl(c,S-26,12,S-12,28,0.7);
      for(let i=0;i<4;i++) {
        const y=36+i*28;
        rl(c,38,y,80+Math.random()*40,y-2,0.65);
        rl(c,38,y+6,60+Math.random()*30,y+4,0.45);
      }
    });

    // 6 — Comic panels
    mk((c, S) => {
      c.save(); c.globalAlpha=0.92; c.strokeStyle='#100c08'; c.lineWidth=2.8;
      c.strokeRect(10,10,S-20,S-20); c.restore();
      rl(c,10,S*0.44,S*0.55,S*0.44,1);
      rl(c,S*0.55,10,S*0.55,S*0.44,1);
      rl(c,10,S*0.70,S-10,S*0.70,0.95);
      for(let i=0;i<10;i++) rl(c,S*0.58+i*6,12,S*0.58+i*6,S*0.42,0.35);
      for(let i=0;i<5;i++) rl(c,30+i*18,S*0.74,25+i*20,S-14,0.4);
    });

    // 7 — Seated figure
    mk((c, S) => {
      const cx=S/2, cy=S*0.42;
      c.save(); c.globalAlpha=0.90; c.strokeStyle='#100c08'; c.lineWidth=2.6;
      c.beginPath(); c.arc(cx,cy-S*0.26,11,0,Math.PI*2); c.stroke(); c.restore();
      rl(c,cx,cy-S*0.15,cx,cy+S*0.05,1);
      rl(c,cx,cy-S*0.09,cx-32,cy-S*0.02,0.95);
      rl(c,cx-32,cy-S*0.02,cx-40,cy+S*0.12,0.9);
      rl(c,cx,cy-S*0.09,cx+30,cy-S*0.01,0.95);
      rl(c,cx+30,cy-S*0.01,cx+38,cy+S*0.13,0.9);
      rl(c,cx,cy+S*0.05,cx-12,cy+S*0.26,1);
      rl(c,cx-12,cy+S*0.26,cx-10,cy+S*0.42,0.9);
      rl(c,cx,cy+S*0.05,cx+12,cy+S*0.22,1);
      rl(c,cx+12,cy+S*0.22,cx+16,cy+S*0.42,0.9);
      rl(c,cx-18,cy+S*0.42,cx+22,cy+S*0.42,0.8);
    });
  }

  // ── Page factory ──────────────────────────────────────────
  function makePage(z) {
    const hasSketch = Math.random() > 0.18;
    const baseW = 0.09 + Math.random() * 0.09;
    return {
      x: 0.04+Math.random()*0.92, y: 0.04+Math.random()*0.92,
      z: z!=null ? z : 0.35+Math.random()*0.65,
      zSpeed: 0.00035+Math.random()*0.00055,
      baseW, baseH: baseW*(1.32+Math.random()*0.22),
      rotX: (Math.random()-0.5)*0.55, rotY: (Math.random()-0.5)*0.45, rotZ: (Math.random()-0.5)*0.38,
      rotXSpeed: (Math.random()-0.5)*0.0025, rotYSpeed: (Math.random()-0.5)*0.0032, rotZSpeed: (Math.random()-0.5)*0.0018,
      flutterAmp: 0.05+Math.random()*0.13, flutterSpeed: 0.7+Math.random()*1.4, flutterOffset: Math.random()*Math.PI*2,
      driftX: (Math.random()-0.5)*0.00025, driftY: -0.00008-Math.random()*0.00018,
      sketchIdx: hasSketch ? Math.floor(Math.random()*7) : -1,
      opacity: 0, life: 0, maxLife: 340+Math.random()*220, phase: 'fadein',
    };
  }

  const pages = Array.from({length:22}, () => {
    const p = makePage(Math.random());
    p.life = Math.random() * p.maxLife;
    return p;
  });

  // ── Draw one page ─────────────────────────────────────────
  function drawPage(p, t) {
    if(p.opacity < 0.012) return;
    const vw = innerWidth, vh = innerHeight, short = Math.min(vw, vh);
    const depth = 0.28 + p.z * 0.72;
    const pw = p.baseW * short * depth;
    const ph = p.baseH * short * depth;
    const px = (p.x + (mouse.x-0.5)*0.032*(1-p.z)) * vw;
    const py = (p.y + (mouse.y-0.5)*0.022*(1-p.z)) * vh;
    const flutter = Math.sin(t * p.flutterSpeed * 0.05 + p.flutterOffset) * p.flutterAmp;
    const rotY = p.rotY + flutter;
    const dW = pw * Math.abs(Math.cos(rotY));
    const dH = ph * Math.abs(Math.cos(p.rotX));
    const skX = Math.sin(rotY) * 0.45;
    const skY = Math.sin(p.rotX) * 0.28;
    const closeFade = Math.min(1, p.z * 3.2);
    const alpha = p.opacity * closeFade;
    if(alpha < 0.012) return;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(p.rotZ + Math.sin(t*0.011+p.flutterOffset)*0.025);
    ctx.transform(1, skY, skX, 1, 0, 0);

    // Shadow
    ctx.save(); ctx.globalAlpha = alpha*0.10; ctx.fillStyle='#000';
    ctx.fillRect(dW*0.06, dH*0.07, dW, dH); ctx.restore();

    // Paper — warm off-white
    const pb2 = 0.72 + p.z * 0.20;
    const pr=Math.round(240*pb2), pg=Math.round(232*pb2), pbl=Math.round(214*pb2);
    ctx.save(); ctx.globalAlpha = alpha*0.93; ctx.fillStyle=`rgb(${pr},${pg},${pbl})`;
    ctx.fillRect(-dW*0.5, -dH*0.5, dW, dH); ctx.restore();

    // Border
    ctx.save(); ctx.globalAlpha=alpha*0.42; ctx.strokeStyle=`rgb(${pr-25},${pg-23},${pbl-18})`; ctx.lineWidth=0.7;
    ctx.strokeRect(-dW*0.5,-dH*0.5,dW,dH); ctx.restore();

    // Sketch — strong visibility, large fit
    if(p.sketchIdx >= 0 && sketches[p.sketchIdx]) {
      const sk  = sketches[p.sketchIdx];
      const fit = Math.min(dW, dH) * 0.84;
      ctx.save();
      ctx.globalAlpha = alpha; // full opacity
      ctx.drawImage(sk, -fit*0.5, -fit*0.5, fit, fit);
      ctx.restore();
    }

    // Edge vignette
    ctx.save(); ctx.globalAlpha=alpha*0.08;
    const vg=ctx.createLinearGradient(-dW*0.5,-dH*0.5,dW*0.5,-dH*0.5);
    vg.addColorStop(0,'rgba(0,0,0,0.4)'); vg.addColorStop(0.18,'rgba(0,0,0,0)');
    vg.addColorStop(0.82,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.fillStyle=vg; ctx.fillRect(-dW*0.5,-dH*0.5,dW,dH); ctx.restore();

    ctx.restore();
  }

  // ── Render loop ───────────────────────────────────────────
  let t = 0;
  function frame() {
    requestAnimationFrame(frame);
    t++;
    mouse.x += (mouse.tx - mouse.x) * 0.05;
    mouse.y += (mouse.ty - mouse.y) * 0.05;

    ctx.fillStyle = 'rgba(8,9,11,0.52)';
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    pages.sort((a, b) => b.z - a.z);
    pages.forEach(p => {
      p.z    -= p.zSpeed;
      p.x    += p.driftX;
      p.y    += p.driftY;
      p.rotX += p.rotXSpeed;
      p.rotY += p.rotYSpeed;
      p.rotZ += p.rotZSpeed;
      p.life++;

      const fi=55, fo=65;
      if(p.phase==='fadein')      { p.opacity=Math.min(1,p.life/fi); if(p.opacity>=1) p.phase='visible'; }
      else if(p.phase==='visible'){ p.opacity=1; if(p.life>=p.maxLife-fo) p.phase='fadeout'; }
      else                        { p.opacity=Math.max(0,1-(p.life-(p.maxLife-fo))/fo); }

      if(p.z<=0.015||p.life>=p.maxLife||p.x<-0.22||p.x>1.22||p.y<-0.28||p.y>1.28) {
        Object.assign(p, makePage(0.68+Math.random()*0.32));
      }
      drawPage(p, t);
    });
  }

  window.addEventListener('resize', resize);
  resize();
  ctx.fillStyle='#08090b'; ctx.fillRect(0,0,innerWidth,innerHeight);
  requestAnimationFrame(frame);
})();
</script>

  <script src="menu.js"></script>
</body>
</html>
