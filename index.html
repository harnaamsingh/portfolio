<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harnaam Singh — Illustrator</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #08090b; }

    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* ── Nav ── */
    .home-nav {
      position: fixed;
      inset: 0 0 auto;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 36px;
      pointer-events: none;
    }
    .home-logo {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.88);
      pointer-events: auto;
      text-decoration: none;
    }
    .menu-pill {
      pointer-events: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* ── Hero — bottom left ── */
    .home-hero {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 40px 52px;
      pointer-events: none;
    }
    .hero-eyebrow {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.30);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(64px, 10.5vw, 148px);
      font-weight: 500;
      line-height: 0.92;
      color: #fff;
      margin: 0 0 26px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1.1s 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-name em {
      font-style: italic;
      color: rgba(255,255,255,0.36);
      display: block;
    }
    .hero-tagline {
      font-family: var(--font-body);
      font-size: clamp(13px, 1.2vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.40);
      line-height: 1.65;
      opacity: 0;
      animation: fadeUp 0.9s 1.0s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* ── CTA bottom right ── */
    .home-cta {
      position: fixed;
      bottom: 44px;
      right: 40px;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 0.9s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .btn-pill {
      background: rgba(255,255,255,0.94);
      color: #111;
      border: none;
      border-radius: 999px;
      padding: 14px 30px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.01em;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .btn-pill:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,0.55); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .home-nav  { padding: 20px 22px; }
      .home-hero { padding: 0 22px 100px; }
      .home-cta  { bottom: 30px; right: 22px; }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <header class="home-nav" role="banner">
    <a href="index.html" class="home-logo">HS</a>
    <button class="menu-pill" aria-label="Open navigation">Menu</button>
  </header>

  <div class="home-hero">
    <p class="hero-eyebrow">Portfolio · 2026</p>
    <h1 class="hero-name">Harnaam<em>Singh</em></h1>
    <p class="hero-tagline">Illustrator — concept art,<br>comics &amp; storyboards.</p>
  </div>

  <div class="home-cta">
    <a href="artworks.html" class="btn-pill">Explore Work →</a>
  </div>

  <script>
  (function () {
    'use strict';

    const cv  = document.getElementById('c');
    const ctx = cv.getContext('2d');
    const DPR = Math.min(devicePixelRatio || 1, 2);

    let W, H;
    function resize() {
      W = cv.width  = innerWidth  * DPR;
      H = cv.height = innerHeight * DPR;
      cv.style.width  = innerWidth  + 'px';
      cv.style.height = innerHeight + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      buildSketches();
    }

    // ── Mouse ─────────────────────────────────────────────────
    const mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };
    window.addEventListener('mousemove', e => {
      mouse.tx = e.clientX / innerWidth;
      mouse.ty = e.clientY / innerHeight;
    }, { passive: true });

    // ── Offscreen sketch canvases ─────────────────────────────
    const SKETCH_SIZE = 200;
    let sketches = [];

    function roughLine(c, x0, y0, x1, y1, alpha) {
      c.save();
      c.globalAlpha = alpha || 0.22;
      c.strokeStyle = '#1a1008';
      c.lineWidth   = 0.7 + Math.random() * 0.6;
      c.lineCap     = 'round';
      const mx = (x0+x1)/2 + (Math.random()-0.5)*5;
      const my = (y0+y1)/2 + (Math.random()-0.5)*5;
      c.beginPath();
      c.moveTo(x0, y0);
      c.quadraticCurveTo(mx, my, x1, y1);
      c.stroke();
      c.restore();
    }

    function buildSketches() {
      sketches = [];
      const S = SKETCH_SIZE;

      function mk(drawFn) {
        const oc = document.createElement('canvas');
        oc.width = oc.height = S;
        const cx = oc.getContext('2d');
        drawFn(cx, S);
        sketches.push(oc);
      }

      // 1 — Face gesture
      mk((c, S) => {
        const cx = S/2, cy = S*0.40;
        c.save(); c.globalAlpha=0.20; c.strokeStyle='#1a1008'; c.lineWidth=1.3;
        c.beginPath(); c.ellipse(cx, cy, S*0.22, S*0.27, 0, 0, Math.PI*2); c.stroke(); c.restore();
        roughLine(c, cx-20,cy-10, cx-8,cy-10, 0.26);
        roughLine(c, cx+8,cy-10,  cx+20,cy-10, 0.26);
        roughLine(c, cx,cy-3,    cx-5,cy+9,  0.18);
        roughLine(c, cx-5,cy+9,  cx+5,cy+9,  0.18);
        c.save(); c.globalAlpha=0.20; c.strokeStyle='#1a1008'; c.lineWidth=1.1;
        c.beginPath(); c.arc(cx, cy+17, 11, 0.2, Math.PI-0.2); c.stroke(); c.restore();
        for(let i=0;i<6;i++) roughLine(c, cx-18+i*8,cy-S*0.26, cx-20+i*9,cy-S*0.34, 0.13);
        roughLine(c, cx-6,cy+S*0.27, cx-6,cy+S*0.38, 0.16);
        roughLine(c, cx+6,cy+S*0.27, cx+6,cy+S*0.38, 0.16);
        roughLine(c, cx-6,cy+S*0.38, cx-28,cy+S*0.44, 0.16);
        roughLine(c, cx+6,cy+S*0.38, cx+28,cy+S*0.44, 0.16);
      });

      // 2 — Hand with pen
      mk((c, S) => {
        const bx=S*0.38, by=S*0.68;
        roughLine(c, bx-28,by+28, bx+44,by-52, 0.28);
        roughLine(c, bx-24,by+32, bx+48,by-48, 0.18);
        roughLine(c, bx+44,by-52, bx+52,by-60, 0.32);
        roughLine(c, bx,by,      bx-12,by-18, 0.20);
        roughLine(c, bx+6,by-4,  bx-4,by-24,  0.20);
        roughLine(c, bx+12,by-8, bx+2,by-26,  0.18);
        roughLine(c, bx+18,by-14,bx+12,by-28, 0.16);
        roughLine(c, bx-8,by+8,  bx-22,by-6,  0.18);
        c.save(); c.globalAlpha=0.16; c.strokeStyle='#1a1008'; c.lineWidth=1.2;
        c.beginPath(); c.arc(bx-4,by+18,14,Math.PI*0.9,Math.PI*1.6); c.stroke(); c.restore();
        roughLine(c, bx+52,by-60, bx+70,by-56, 0.22);
        roughLine(c, bx+52,by-60, bx+68,by-70, 0.18);
      });

      // 3 — Figure in motion
      mk((c, S) => {
        const cx=S/2, ty=S*0.10;
        c.save(); c.globalAlpha=0.20; c.strokeStyle='#1a1008'; c.lineWidth=1.1;
        c.beginPath(); c.arc(cx, ty+10, 11, 0, Math.PI*2); c.stroke(); c.restore();
        roughLine(c, cx,ty+21, cx-4,ty+54, 0.22);
        roughLine(c, cx-4,ty+30, cx-36,ty+20, 0.20);
        roughLine(c, cx-36,ty+20,cx-48,ty+32, 0.18);
        roughLine(c, cx-4,ty+30, cx+30,ty+18, 0.20);
        roughLine(c, cx+30,ty+18,cx+44,ty+8,  0.18);
        roughLine(c, cx-4,ty+54, cx-22,ty+86, 0.20);
        roughLine(c, cx-22,ty+86,cx-30,ty+106,0.18);
        roughLine(c, cx-4,ty+54, cx+18,ty+78, 0.20);
        roughLine(c, cx+18,ty+78,cx+28,ty+106,0.18);
        for(let i=0;i<5;i++) roughLine(c, cx+36+i*4,ty+28+i*5, cx+48+i*3,ty+26+i*4, 0.10);
      });

      // 4 — Close-up eye
      mk((c, S) => {
        const cx=S/2, cy=S/2;
        c.save(); c.globalAlpha=0.22; c.strokeStyle='#1a1008'; c.lineWidth=1.3;
        c.beginPath();
        c.moveTo(cx-46,cy);
        c.quadraticCurveTo(cx,cy-30,cx+46,cy);
        c.quadraticCurveTo(cx,cy+24,cx-46,cy);
        c.stroke(); c.restore();
        c.save(); c.globalAlpha=0.20; c.strokeStyle='#1a1008'; c.lineWidth=1.1;
        c.beginPath(); c.arc(cx,cy,17,0,Math.PI*2); c.stroke(); c.restore();
        c.save(); c.globalAlpha=0.28; c.fillStyle='#1a1008';
        c.beginPath(); c.arc(cx,cy,6,0,Math.PI*2); c.fill(); c.restore();
        for(let a=0;a<12;a++) {
          const ang=a*Math.PI/6;
          roughLine(c, cx+Math.cos(ang)*9,cy+Math.sin(ang)*9, cx+Math.cos(ang)*16,cy+Math.sin(ang)*16, 0.12);
        }
        for(let i=0;i<8;i++) {
          const lx=cx-32+i*9;
          const ly=cy-Math.sqrt(Math.max(0,30*30-(lx-cx)*(lx-cx)));
          roughLine(c, lx,ly, lx+(Math.random()-0.5)*3,ly-9-Math.random()*5, 0.18);
        }
      });

      // 5 — Ruled blank page
      mk((c, S) => {
        for(let y=22;y<S-12;y+=15) roughLine(c, 14,y, S-14,y, 0.09);
        roughLine(c, 30,12,30,S-12, 0.11);
        roughLine(c, S-26,12,S-12,28, 0.16);
        roughLine(c, S-26,12,S-26,22, 0.13);
        roughLine(c, S-18,12,S-12,28, 0.13);
      });

      // 6 — Comic panel layout
      mk((c, S) => {
        roughLine(c, 10,10,S-10,10,  0.20);
        roughLine(c, 10,10,10,S-10,  0.20);
        roughLine(c, S-10,10,S-10,S-10,0.20);
        roughLine(c, 10,S-10,S-10,S-10,0.20);
        roughLine(c, 10,S*0.44,S*0.55,S*0.44, 0.18);
        roughLine(c, S*0.55,10,S*0.55,S*0.44, 0.18);
        roughLine(c, 10,S*0.70,S-10,S*0.70,   0.16);
        for(let i=0;i<9;i++) roughLine(c, S*0.58+i*7,12,S*0.58+i*7,S*0.42, 0.07);
      });

      // 7 — Abstract gesture / figure seated
      mk((c, S) => {
        const cx=S/2, cy=S*0.42;
        c.save(); c.globalAlpha=0.20; c.strokeStyle='#1a1008'; c.lineWidth=1.1;
        c.beginPath(); c.arc(cx,cy-S*0.26,10,0,Math.PI*2); c.stroke(); c.restore();
        roughLine(c, cx,cy-S*0.16, cx,cy+S*0.04, 0.20);
        roughLine(c, cx,cy-S*0.10, cx-30,cy-S*0.04, 0.18);
        roughLine(c, cx-30,cy-S*0.04, cx-38,cy+S*0.10, 0.16);
        roughLine(c, cx,cy-S*0.10, cx+28,cy-S*0.02, 0.18);
        roughLine(c, cx+28,cy-S*0.02,cx+36,cy+S*0.12,0.16);
        roughLine(c, cx,cy+S*0.04, cx-10,cy+S*0.24, 0.20);
        roughLine(c, cx-10,cy+S*0.24,cx-8,cy+S*0.40,0.18);
        roughLine(c, cx,cy+S*0.04, cx+10,cy+S*0.20, 0.20);
        roughLine(c, cx+10,cy+S*0.20,cx+14,cy+S*0.40,0.18);
        roughLine(c, cx-16,cy+S*0.40,cx+20,cy+S*0.40,0.14);
      });
    }

    // ── Page factory ──────────────────────────────────────────
    function makePage(z) {
      const hasSketch  = Math.random() > 0.28;
      const sketchIdx  = hasSketch ? (Math.floor(Math.random() * 7)) : -1;
      const baseW      = 0.09 + Math.random() * 0.09;
      return {
        x:  0.04 + Math.random() * 0.92,
        y:  0.04 + Math.random() * 0.92,
        z:  z != null ? z : 0.35 + Math.random() * 0.65,
        zSpeed: 0.00035 + Math.random() * 0.00055,
        baseW,
        baseH: baseW * (1.32 + Math.random()*0.22),
        rotX: (Math.random()-0.5) * 0.55,
        rotY: (Math.random()-0.5) * 0.45,
        rotZ: (Math.random()-0.5) * 0.38,
        rotXSpeed: (Math.random()-0.5) * 0.0025,
        rotYSpeed: (Math.random()-0.5) * 0.0032,
        rotZSpeed: (Math.random()-0.5) * 0.0018,
        flutterAmp:   0.05 + Math.random() * 0.13,
        flutterSpeed: 0.7  + Math.random() * 1.4,
        flutterOffset: Math.random() * Math.PI * 2,
        driftX: (Math.random()-0.5) * 0.00025,
        driftY: -0.00008 - Math.random()*0.00018,
        sketchIdx,
        opacity: 0,
        life: 0,
        maxLife: 340 + Math.random() * 220,
        phase: 'fadein',
      };
    }

    const PAGE_COUNT = 22;
    const pages = [];
    for(let i=0;i<PAGE_COUNT;i++){
      const p = makePage(Math.random());
      p.life  = Math.random() * p.maxLife;
      pages.push(p);
    }

    // ── Draw one page ─────────────────────────────────────────
    function drawPage(p, t) {
      if(p.opacity < 0.012) return;

      const vw = innerWidth, vh = innerHeight;
      const short = Math.min(vw, vh);

      const depth  = 0.28 + p.z * 0.72;
      const pw     = p.baseW * short * depth;
      const ph     = p.baseH * short * depth;

      const px = (p.x + (mouse.x-0.5)*0.032*(1-p.z)) * vw;
      const py = (p.y + (mouse.y-0.5)*0.022*(1-p.z)) * vh;

      const flutter = Math.sin(t * p.flutterSpeed * 0.05 + p.flutterOffset) * p.flutterAmp;
      const rotY    = p.rotY + flutter;

      const cosY = Math.cos(rotY);
      const cosX = Math.cos(p.rotX);
      const dW   = pw * Math.abs(cosY);
      const dH   = ph * Math.abs(cosX);
      const skX  = Math.sin(rotY) * 0.45;
      const skY  = Math.sin(p.rotX) * 0.28;

      const closeFade = Math.min(1, p.z * 3.2);
      const alpha     = p.opacity * closeFade;
      if(alpha < 0.012) return;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.rotZ + Math.sin(t*0.011 + p.flutterOffset)*0.025);
      ctx.transform(1, skY, skX, 1, 0, 0);

      // Shadow
      ctx.save();
      ctx.globalAlpha = alpha * 0.10;
      ctx.fillStyle   = '#000';
      ctx.fillRect(dW*0.06, dH*0.07, dW, dH);
      ctx.restore();

      // Paper tone — warm aged off-white, brighter when closer
      const pb2 = 0.70 + p.z * 0.22;
      const pr  = Math.round(238 * pb2);
      const pg2 = Math.round(230 * pb2);
      const pb3 = Math.round(212 * pb2);

      ctx.save();
      ctx.globalAlpha = alpha * 0.90;
      ctx.fillStyle   = `rgb(${pr},${pg2},${pb3})`;
      ctx.fillRect(-dW*0.5, -dH*0.5, dW, dH);
      ctx.restore();

      // Page border
      ctx.save();
      ctx.globalAlpha = alpha * 0.45;
      ctx.strokeStyle = `rgb(${pr-28},${pg2-26},${pb3-20})`;
      ctx.lineWidth   = 0.7;
      ctx.strokeRect(-dW*0.5, -dH*0.5, dW, dH);
      ctx.restore();

      // Sketch content
      if(p.sketchIdx >= 0 && sketches[p.sketchIdx]) {
        const sk  = sketches[p.sketchIdx];
        const fit = Math.min(dW, dH) * 0.74;
        ctx.save();
        ctx.globalAlpha = alpha * 0.72;
        ctx.drawImage(sk, -fit*0.5, -fit*0.5, fit, fit);
        ctx.restore();
      }

      // Edge vignette
      ctx.save();
      ctx.globalAlpha = alpha * 0.10;
      const vg = ctx.createLinearGradient(-dW*0.5,-dH*0.5,dW*0.5,-dH*0.5);
      vg.addColorStop(0,   'rgba(0,0,0,0.45)');
      vg.addColorStop(0.18,'rgba(0,0,0,0)');
      vg.addColorStop(0.82,'rgba(0,0,0,0)');
      vg.addColorStop(1,   'rgba(0,0,0,0.35)');
      ctx.fillStyle = vg;
      ctx.fillRect(-dW*0.5,-dH*0.5,dW,dH);
      ctx.restore();

      ctx.restore();
    }

    // ── Render loop ───────────────────────────────────────────
    let t = 0;

    function frame() {
      requestAnimationFrame(frame);
      t++;

      // Smooth mouse
      mouse.x += (mouse.tx - mouse.x) * 0.05;
      mouse.y += (mouse.ty - mouse.y) * 0.05;

      const vw = innerWidth, vh = innerHeight;

      // Dark clear — low alpha so pages ghost briefly
      ctx.fillStyle = 'rgba(8,9,11,0.52)';
      ctx.fillRect(0, 0, vw, vh);

      // Sort back-to-front
      pages.sort((a, b) => b.z - a.z);

      pages.forEach(p => {
        p.z    -= p.zSpeed;
        p.x    += p.driftX;
        p.y    += p.driftY;
        p.rotX += p.rotXSpeed;
        p.rotY += p.rotYSpeed;
        p.rotZ += p.rotZSpeed;
        p.life++;

        const fi = 55, fo = 65;
        if(p.phase === 'fadein') {
          p.opacity = Math.min(1, p.life / fi);
          if(p.opacity >= 1) p.phase = 'visible';
        } else if(p.phase === 'visible') {
          p.opacity = 1;
          if(p.life >= p.maxLife - fo) p.phase = 'fadeout';
        } else {
          p.opacity = Math.max(0, 1 - (p.life - (p.maxLife - fo)) / fo);
        }

        if(p.z <= 0.015 || p.life >= p.maxLife || p.x<-0.22||p.x>1.22||p.y<-0.28||p.y>1.28) {
          const np = makePage(0.68 + Math.random() * 0.32);
          Object.assign(p, np);
        }

        drawPage(p, t);
      });
    }

    // ── Init ──────────────────────────────────────────────────
    window.addEventListener('resize', resize);
    resize();

    ctx.fillStyle = '#08090b';
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    requestAnimationFrame(frame);
  })();
  </script>

  <script src="menu.js"></script>
</body>
</html>
